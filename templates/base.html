<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davil 😈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .navbar {
            background-color: black;
            /* dark background for neon effect */
        }

        .navbar-brand {
            color: yellow;
            font-weight: bold;
            font-size: 1.5rem;
            text-shadow: 0 0 5px yellow, 0 0 10px yellow;
        }

        .navbar-brand:hover {
            color: #fff176;
            /* soft neon yellow hover */
        }

        .btn-neon-green {
            background-color: #39ff14;
            color: black;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 10px #39ff14;
            transition: 0.3s;
        }

        .btn-neon-pink {
            background-color: #ff00ff;
            color: black;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 10px #ff00ff;
            transition: 0.3s;
        }

        .btn-neon-pink:hover {
            background-color: #39ff14;
            box-shadow: 0 0 15px #39ff14;
            color: white;
        }

        .btn-neon-green:hover {
            background-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
            color: white;
        }

        .btn-neon-yellow {
            background-color: #ffff33;
            color: black;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 10px #ffff33;
            transition: 0.3s;
        }

        .btn-neon-yellow:hover {
            background-color: #39ff14;
            box-shadow: 0 0 15px #39ff14;
            color: black;
        }

        .btn-neon-blue {
            background-color: #0022ff;
            color: black;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 10px #0022ff;
            transition: 0.3s;
        }

        .btn-neon-blue:hover {
            background-color: #39ff14;
            box-shadow: 0 0 15px #39ff14;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar px-3">
        <a class="navbar-brand" href="{% url 'home' %}">Davil 😈</a>
        <div class="ms-auto d-flex gap-3">
            {% if user.is_authenticated %}
            <a href="{% url 'home' %}"><button class="btn btn-neon-blue">Home</button></a>
            <a href="{% url 'profile' %}"><button class="btn btn-neon-green">Profile</button></a>
            <a href="{% url 'company_list' %}"><button class="btn btn-neon-yellow">Companies</button></a>
            <a href="{% url 'logout' %}"><button class="btn btn-neon-pink">Logout</button></a>

            {% else %}
            <a href="{% url 'register' %}"><button class="btn btn-neon-green">Register</button></a>
            <a href="{% url 'login' %}"><button class="btn btn-neon-yellow">Login</button></a>
            {% endif %}
        </div>
    </nav>
    {% block content %}



    {% endblock %}
    {{ auto_logout_client }}
</body>

</html>
