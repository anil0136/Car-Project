{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background: black;
        color: #39ff14;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    h1,
    h2 {
        text-shadow: 0 0 8px #39ff14, 0 0 12px #ff00ff, 0 0 20px #00f7ff;
    }

    .carousel-item img {
        width: 700px;
        height: 450px;
        object-fit: cover;
        border: 5px solid;
        border-radius: 20px;
        box-shadow: 0 0 25px currentColor;
        /* makes glow uniform */
    }

    /* individual border colors */
    .carousel-item:nth-child(1) img {
        border-color: #39ff14;
        color: #39ff14;
    }

    .carousel-item:nth-child(2) img {
        border-color: #ff00ff;
        color: #ff00ff;
    }

    .carousel-item:nth-child(3) img {
        border-color: #00f7ff;
        color: #00f7ff;
    }

    /* Arrow buttons */
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 50px;
        height: 50px;
        background-size: 100% 100%;
        filter: drop-shadow(0 0 10px #39ff14);
        transition: filter 0.3s ease-in-out;
    }

    .carousel-control-prev,
    .carousel-control-next {
        width: 8%;
    }

    .neon-btn {
        background-color: transparent;
        border: 2px solid #39ff14;
        color: #39ff14;
        text-shadow: 0 0 8px #39ff14;
        transition: all 0.3s ease-in-out;
    }

    .neon-btn:hover {
        background-color: #ff00ff;
        border-color: #00f7ff;
        color: white;
        box-shadow: 0 0 10px #ff00ff, 0 0 25px #00f7ff;
    }
</style>

<div class="container text-center mt-5">

    <div id="imageCarousel" class="carousel slide mt-4" data-bs-ride="carousel" data-bs-interval="4000">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="{% static 'images/l1.jpg' %}" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/l2.jpg' %}" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/l3.jpg' %}" alt="Slide 3">
            </div>
        </div>

        <button class="carousel-control-prev neon-arrow" type="button" data-bs-target="#imageCarousel"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next neon-arrow" type="button" data-bs-target="#imageCarousel"
            data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="mt-4">
        <a href="{% url 'company_list' %}"><button class="btn neon-btn me-3"><b>Buy a Car</b></button></a>
        <a href="{% url 'rent' %}"><button class="btn neon-btn"><b>Rent a Car</b></button></a>
    </div>
</div>

<script>
    const neonColors = ["#39ff14", "#ff00ff", "#00f7ff", "#ffff00", "#ff4500"];
    let currentIndex = 0;

    document.querySelectorAll(".neon-arrow").forEach(button => {
        button.addEventListener("click", function () {
            currentIndex = (currentIndex + 1) % neonColors.length;
            document.querySelectorAll(".carousel-control-prev-icon, .carousel-control-next-icon")
                .forEach(icon => {
                    icon.style.filter = `drop-shadow(0 0 12px ${neonColors[currentIndex]})`;
                });
        });
    });
</script>
{% endblock %}

{{ redirect_to_login_immediately }}
